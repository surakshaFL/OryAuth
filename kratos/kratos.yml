version: v1.3.1

dsn: sqlite:///var/lib/sqlite/kratos.db?_fk=true&mode=rwc

serve:
  public:
    base_url: http://127.0.0.1:5443/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:4455
        - http://127.0.0.1:4455
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-CSRF-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://127.0.0.1:5444/

selfservice:
  default_browser_return_url: http://127.0.0.1:4455/login
  allowed_return_urls:
    - http://localhost:4455
    - http://localhost:4455/
    - http://localhost:4455/login
    - http://localhost:4455/register
    - http://127.0.0.1:4455
    - http://127.0.0.1:4455/
    - http://127.0.0.1:4455/login
    - http://127.0.0.1:4455/register
  methods:
    password:
      enabled: true
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            client_id: __GOOGLE_CLIENT_ID__
            client_secret: __GOOGLE_CLIENT_SECRET__
            issuer_url: https://accounts.google.com
            mapper_url: file:///etc/config/kratos/google.mapper.jsonnet
            scope:
              - openid
              - email
              - profile
            requested_claims:
              id_token:
                email:
                  essential: true
                email_verified:
                  essential: true
                given_name:
                  essential: true
                family_name: null
  flows:
    error:
      ui_url: http://127.0.0.1:4455/error
    login:
      ui_url: http://127.0.0.1:4455/login
      lifespan: 10m
    registration:
      ui_url: http://127.0.0.1:4455/register
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
        oidc:
          hooks:
            - hook: session
    recovery:
      enabled: true
      ui_url: http://127.0.0.1:4455/forgot-password
      use: code
    verification:
      enabled: true
      ui_url: http://127.0.0.1:4455/verify-email
      use: code
      after:
        default_browser_return_url: http://127.0.0.1:4455/login
    settings:
      ui_url: http://127.0.0.1:4455/login
      privileged_session_max_age: 15m
      required_aal: highest_available
    logout:
      after:
        default_browser_return_url: http://127.0.0.1:4455/login

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - "PLEASE-CHANGE-THIS-COOKIE-SECRET-IN-PROD"
  cipher:
    - "12345678901234567890123456789012"

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
