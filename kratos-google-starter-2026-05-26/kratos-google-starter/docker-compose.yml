services:
  kratos:
    image: oryd/kratos:v1.3.1
    ports:
      - "4433:4433"
      - "4434:4434"
    volumes:
      - ./kratos.yml:/etc/config/kratos/kratos.yml:ro
      - ./identity:/etc/config/kratos/identity:ro
      - ./oidc:/etc/config/kratos/oidc:ro
      - kratos-data:/var/lib/sqlite
    command: serve -c /etc/config/kratos/kratos.yml --dev
    restart: unless-stopped
    depends_on:
      - mailslurper

  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - "4436:4436"
      - "4437:4437"
    restart: unless-stopped

volumes:
  kratos-data:
